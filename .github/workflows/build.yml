name: Build Installer

# Triggers when you push a version tag like v1.3, v1.4 etc.
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      # Step 1: Download all source files from the repo onto the build machine
      - name: Checkout source code
        uses: actions/checkout@v4

      # Step 2 + 3: Install Inno Setup and compile the .iss script in one step
      # Uses the official Inno Setup GitHub Action which handles installation automatically
      - name: Compile installer with Inno Setup
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: MoveWindowBetweenDesktops-setup-v1.3.iss
          options: /O+

      # Step 4: Upload the compiled .exe as a build artifact
      # This artifact will later be picked up by SignPath for signing
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: Output\move-window-between-desktops-setup.exe
          if-no-files-found: error